<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Pelanggan Tema Coklat</title>
    <style>
        /* --- BAGIAN CSS (WARNA & TAMPILAN) --- */
        body {
            background-color: #d7ccc8; /* Warna latar coklat susu muda */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            /* Border tebal di atas agar terlihat elegan */
            border-top: 12px solid #5d4037; 
            /* Bayangan agar form terlihat timbul */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #5d4037;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #4e342e;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #d7ccc8;
            border-radius: 8px;
            box-sizing: border-box; /* Agar padding tidak merusak lebar */
            transition: 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #8d6e63;
            background-color: #fafafa;
        }

        /* Gaya untuk area pilihan (Radio) */
        .pilihan-box {
            background-color: #efebe9;
            padding: 10px;
            border-radius: 8px;
            margin-top: 5px;
        }

        .radio-item {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
            cursor: pointer;
        }

        .checkbox-area {
            margin: 25px 0;
            font-size: 0.9em;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #795548;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #3e2723;
        }

        /* Kotak hasil setelah klik tombol */
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #fff3e0;
            color: #5d4037;
            display: none; /* Sembunyi dulu */
            border-left: 6px solid #8d6e63;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Pelanggan</h2>

    <label>Nama:</label>
    <input type="text" id="nama" placeholder="Masukkan nama lengkap">

    <label>Kelas:</label>
    <input type="text" id="kelas" placeholder="Contoh: 10 IPA 1">

    <label>Umur:</label>
    <div class="pilihan-box">
        <label class="radio-item"><input type="radio" name="umur" value="10-12"> 10-12 thn</label>
        <label class="radio-item"><input type="radio" name="umur" value="13-15"> 13-15 thn</label>
        <label class="radio-item"><input type="radio" name="umur" value="16-18"> 16-18 thn</label>
    </div>

    <label>Jenis Kelamin:</label>
    <div class="pilihan-box">
        <label class="radio-item"><input type="radio" name="gender" value="Laki-laki"> Laki-laki</label>
        <label class="radio-item"><input type="radio" name="gender" value="Perempuan"> Perempuan</label>
    </div>

    <label>Tingkatan:</label>
    <div class="pilihan-box">
        <label class="radio-item"><input type="radio" name="tingkatan" value="SD"> SD</label>
        <label class="radio-item"><input type="radio" name="tingkatan" value="SMP"> SMP</label>
        <label class="radio-item"><input type="radio" name="tingkatan" value="SMA"> SMA</label>
    </div>

    <div class="checkbox-area">
        <label style="display: flex; align-items: center; font-weight: normal;">
            <input type="checkbox" id="setuju" style="margin-right: 10px;"> Saya setuju dengan syarat dan ketentuan.
        </label>
    </div>

    <button id="tampilkanBTN">SUBMIT DATA</button>

    <div id="hasil" class="result"></div>
</div>

<script>
    /* --- BAGIAN JAVASCRIPT (LOGIKA TOMBOL) --- */
    document.getElementById('tampilkanBTN').addEventListener('click', function() {
        const nama = document.getElementById('nama').value;
        const kelas = document.getElementById('kelas').value;
        const setuju = document.getElementById('setuju').checked;

        // Mencari nilai radio yang dipilih
        const umur = document.querySelector('input[name="umur"]:checked');
        const gender = document.querySelector('input[name="gender"]:checked');
        const tingkatan = document.querySelector('input[name="tingkatan"]:checked');

        const hasilDiv = document.getElementById('hasil');

        // Validasi input
        if (!nama || !kelas || !umur || !gender || !tingkatan) {
            alert("Opps! Ada data yang belum diisi.");
            return;
        }

        if (!setuju) {
            alert("Centang kotak persetujuan dulu ya!");
            return;
        }

        // Tampilkan Hasil
        hasilDiv.style.display = 'block';
        hasilDiv.innerHTML = `
            <strong>Data Berhasil Disimpan!</strong><br><hr>
            <b>Nama:</b> ${nama}<br>
            <b>Kelas:</b> ${kelas}<br>
            <b>Umur:</b> ${umur.value}<br>
            <b>Gender:</b> ${gender.value}<br>
            <b>Tingkatan:</b> ${tingkatan.value}
        `;
    });
</script>

</body>
</html>
